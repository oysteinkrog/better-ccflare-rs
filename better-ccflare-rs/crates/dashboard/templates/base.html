<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>better-ccflare — Dashboard</title>
  <link rel="stylesheet" href="/dashboard/assets/pico.min.css">
  <style>
    :root {
      --bccf-orange: #f38020;
      --bccf-orange-dark: #d96e15;
      --nav-width: 220px;
    }
    [data-theme="dark"] {
      --bccf-bg: #1a1a2e;
    }
    /* Layout */
    body { margin: 0; display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--nav-width);
      min-height: 100vh;
      padding: 1rem;
      border-right: 1px solid var(--pico-muted-border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      overflow-y: auto;
      background: var(--pico-background-color);
      z-index: 10;
    }
    .sidebar-brand {
      font-weight: bold;
      font-size: 1.1rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      color: var(--bccf-orange);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sidebar-brand small {
      font-weight: normal;
      font-size: 0.7rem;
      opacity: 0.6;
    }
    .sidebar nav { flex: 1; }
    .sidebar nav a {
      display: block;
      padding: 0.5rem 0.75rem;
      margin: 0.15rem 0;
      border-radius: 0.375rem;
      text-decoration: none;
      color: var(--pico-color);
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .sidebar nav a:hover { background: var(--pico-muted-border-color); }
    .sidebar nav a.active {
      background: var(--bccf-orange);
      color: white;
      font-weight: 600;
    }
    .sidebar-footer {
      padding-top: 0.5rem;
      border-top: 1px solid var(--pico-muted-border-color);
      font-size: 0.8rem;
    }
    .main-content {
      margin-left: var(--nav-width);
      flex: 1;
      padding: 1.5rem 2rem;
      min-width: 0;
    }
    /* Theme toggle */
    .theme-toggle {
      cursor: pointer;
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.375rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      color: var(--pico-color);
      width: 100%;
      margin-bottom: 0.5rem;
    }
    .theme-toggle:hover { background: var(--pico-muted-border-color); }
    /* Hamburger for mobile */
    .hamburger { display: none; }
    /* Tab content loading indicator */
    .htmx-request #tab-content { opacity: 0.6; }
    /* Mobile */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s;
        width: 260px;
      }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; }
      .hamburger {
        display: block;
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 20;
        background: var(--pico-background-color);
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        font-size: 1.2rem;
        cursor: pointer;
      }
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 9;
      }
      .sidebar.open ~ .overlay { display: block; }
    }
  </style>
</head>
<body>
  <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')" aria-label="Menu">☰</button>
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="/dashboard">
      ⚡ better-ccflare
      <small>v{{ version }}</small>
    </a>
    <nav>
      {% for tab in tabs %}
      <a href="/dashboard/{{ tab.slug }}"
         hx-get="/dashboard/{{ tab.slug }}"
         hx-target="#tab-content"
         hx-push-url="true"
         hx-swap="innerHTML"
         class="{% if active_tab == tab.slug %}active{% endif %}"
         onclick="setActiveTab(this)">
        {{ tab.label }}
      </a>
      {% endfor %}
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span> Toggle theme
      </button>
    </div>
  </aside>
  <div class="overlay" onclick="document.querySelector('.sidebar').classList.remove('open')"></div>
  <main class="main-content">
    <div id="tab-content">
      {{ tab_content|safe }}
    </div>
  </main>
  <script src="/dashboard/assets/htmx.min.js"></script>
  <script>
    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('bccf-theme', next);
      document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    }
    // Restore theme
    (function() {
      const saved = localStorage.getItem('bccf-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        const icon = document.getElementById('theme-icon');
        if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
      }
    })();
    // Active tab highlight
    function setActiveTab(el) {
      document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
      // Close mobile sidebar
      document.querySelector('.sidebar').classList.remove('open');
    }
    // On HTMX content swap, update active tab from URL
    document.body.addEventListener('htmx:afterSettle', function() {
      const path = window.location.pathname;
      document.querySelectorAll('.sidebar nav a').forEach(a => {
        const href = a.getAttribute('href');
        a.classList.toggle('active', path === href || (href === '/dashboard/overview' && path === '/dashboard'));
      });
    });
    // Handle browser back/forward
    window.addEventListener('popstate', function() {
      htmx.ajax('GET', window.location.pathname, {target: '#tab-content', swap: 'innerHTML'});
    });
  </script>
</body>
</html>
