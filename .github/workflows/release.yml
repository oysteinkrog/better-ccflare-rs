name: Release Multi-Architecture Binaries

on:
  push:
    tags:
      - 'v*'  # Matches all v* tags (stable and pre-release)
  workflow_dispatch:

jobs:
  build:
    name: Build Multi-Architecture Binaries
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release type
        id: release_type
        run: |
          # Determine if this is a pre-release or stable release
          REF_NAME="${{ github.ref_name }}"

          if [[ "$REF_NAME" =~ (beta|rc|alpha|pre) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_type=Beta" >> $GITHUB_OUTPUT
            echo "release_title=Beta Release" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_type=Stable" >> $GITHUB_OUTPUT
            echo "release_title=Stable Release" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify dependencies
        run: |
          echo "Checking workspace packages..."
          ls -d packages/* | head -5
          echo ""
          echo "Checking for tiktoken in node_modules..."
          ls -la node_modules/@dqbd/ 2>/dev/null || echo "No @dqbd packages found"
          echo ""
          echo "Checking for tiktoken in packages/proxy/node_modules..."
          ls -la packages/proxy/node_modules/@dqbd/ 2>/dev/null || echo "No @dqbd packages in packages/proxy/node_modules"
          echo ""
          echo "Checking workspace node_modules structure..."
          find packages/proxy/node_modules -name "tiktoken*" -type d 2>/dev/null | head -5 || echo "No tiktoken found"
          echo ""
          echo "Final check for tiktoken WASM file..."
          if [ ! -f "node_modules/@dqbd/tiktoken/lite/tiktoken_bg.wasm" ]; then
            echo "ERROR: tiktoken WASM file not found at root node_modules!"
            echo "This is expected in a workspace - dependencies are installed per package."
            echo "We'll need to adjust our build script to handle this."
          else
            echo "✓ tiktoken WASM file found at root node_modules"
          fi

      - name: Build dashboard
        run: bun run build:dashboard

      - name: Build all architectures
        run: |
          cd apps/cli
          bun run build:multi

      - name: Verify binaries
        run: |
          ls -lh apps/cli/dist/
          echo "${{ steps.release_type.outputs.release_type }} binaries built successfully!"

      - name: Generate Changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog content
          if [[ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]]; then
            CHANGELOG="## 🧪 Beta Release ${{ github.ref_name }}

          ### ⚠️ Beta Notice
          This is a beta release intended for testing purposes. It may contain bugs and unstable features.

          ## Multi-Architecture Binaries

          Download the appropriate binary for your platform:

          - **Linux x86_64**: \`better-ccflare-linux-amd64\`
          - **Linux ARM64** (Raspberry Pi 3/4/5, Oracle Cloud ARM, AWS Graviton): \`better-ccflare-linux-arm64\`
          - **macOS Intel**: \`better-ccflare-macos-x86_64\`
          - **macOS Apple Silicon**: \`better-ccflare-macos-arm64\`
          - **Windows x86_64**: \`better-ccflare-windows-x64.exe\`

          ### Installation

          \`\`\`bash
          # Linux x86_64
          wget https://github.com/SijanC147/better-ccflare/releases/download/${{ github.ref_name }}/better-ccflare-linux-amd64
          chmod +x better-ccflare-linux-amd64
          ./better-ccflare-linux-amd64

          # macOS Apple Silicon (ARM64)
          curl -L -o better-ccflare-macos-arm64 https://github.com/SijanC147/better-ccflare/releases/download/${{ github.ref_name }}/better-ccflare-macos-arm64
          chmod +x better-ccflare-macos-arm64
          xattr -d com.apple.quarantine better-ccflare-macos-arm64  # Required for unsigned binaries
          ./better-ccflare-macos-arm64
          \`\`\`

          **macOS Users:** The \`xattr\` command is required to bypass Gatekeeper for unsigned binaries. If you prefer not to run unsigned binaries, [install from source](https://github.com/SijanC147/better-ccflare#install-from-source) instead.

          ---"
          else
            CHANGELOG="## 🎉 Stable Release ${{ github.ref_name }}

          ### 🍺 Install via Homebrew (macOS)

          \`\`\`bash
          brew tap seanbugeja/hextap
          brew install better-ccflare
          \`\`\`

          ## Multi-Architecture Binaries

          Download the appropriate binary for your platform:

          - **Linux x86_64**: \`better-ccflare-linux-amd64\`
          - **Linux ARM64** (Raspberry Pi 3/4/5, Oracle Cloud ARM, AWS Graviton): \`better-ccflare-linux-arm64\`
          - **macOS Intel**: \`better-ccflare-macos-x86_64\`
          - **macOS Apple Silicon**: \`better-ccflare-macos-arm64\`
          - **Windows x86_64**: \`better-ccflare-windows-x64.exe\`

          ### Installation

          \`\`\`bash
          # Linux x86_64
          wget https://github.com/SijanC147/better-ccflare/releases/download/${{ github.ref_name }}/better-ccflare-linux-amd64
          chmod +x better-ccflare-linux-amd64
          ./better-ccflare-linux-amd64

          # macOS Apple Silicon (ARM64)
          curl -L -o better-ccflare-macos-arm64 https://github.com/SijanC147/better-ccflare/releases/download/${{ github.ref_name }}/better-ccflare-macos-arm64
          chmod +x better-ccflare-macos-arm64
          xattr -d com.apple.quarantine better-ccflare-macos-arm64  # Required for unsigned binaries
          ./better-ccflare-macos-arm64
          \`\`\`

          **macOS Users:** The \`xattr\` command is required to bypass Gatekeeper for unsigned binaries. For easier installation, use Homebrew (see above) instead.

          ---"
          fi

          if [ -n "$PREV_TAG" ]; then
            # Get commits since previous tag
            COMMITS=$(git log --pretty=format:"%h %s" $PREV_TAG..HEAD)

            if [ -n "$COMMITS" ]; then
              CHANGELOG="$CHANGELOG

          ## What's Changed

          "
              # Categorize commits and remove duplicates (especially CLAUDE_CLI_VERSION updates)
              FEATURES=$(echo "$COMMITS" | grep -E "feat|add|new" | grep -v "chore: update CLAUDE_CLI_VERSION" | sort -u | head -5)
              FIXES=$(echo "$COMMITS" | grep -E "fix|bug|resolve" | grep -v "chore: update CLAUDE_CLI_VERSION" | sort -u | head -5)
              SECURITY=$(echo "$COMMITS" | grep -E "security|vulnerabilit|redact|ReDoS" | grep -v "chore: update CLAUDE_CLI_VERSION" | sort -u | head -5)
              IMPROVEMENTS=$(echo "$COMMITS" | grep -E "improve|enhance|update|refactor" | grep -v "chore: update CLAUDE_CLI_VERSION" | sort -u | head -5)

              # Also filter out duplicate chore messages specifically
              CHORE_UNIQUE=$(echo "$COMMITS" | grep -E "chore" | grep -v "chore: update CLAUDE_CLI_VERSION" | sort -u | head -3)

              if [ -n "$FEATURES" ]; then
                CHANGELOG="$CHANGELOG
          ### 🚀 Features
          "
                while IFS= read -r commit; do
                  if [ -n "$commit" ]; then
                    HASH=$(echo "$commit" | cut -d' ' -f1)
                    MSG=$(echo "$commit" | cut -d' ' -f2-)
                    CHANGELOG="$CHANGELOG
          - $MSG ([\`$HASH\`](https://github.com/SijanC147/better-ccflare/commit/$HASH))"
                  fi
                done <<< "$FEATURES"
              fi

              if [ -n "$FIXES" ]; then
                CHANGELOG="$CHANGELOG

          ### 🐛 Bug Fixes
          "
                while IFS= read -r commit; do
                  if [ -n "$commit" ]; then
                    HASH=$(echo "$commit" | cut -d' ' -f1)
                    MSG=$(echo "$commit" | cut -d' ' -f2-)
                    CHANGELOG="$CHANGELOG
          - $MSG ([\`$HASH\`](https://github.com/SijanC147/better-ccflare/commit/$HASH))"
                  fi
                done <<< "$FIXES"
              fi

              if [ -n "$SECURITY" ]; then
                CHANGELOG="$CHANGELOG

          ### 🔒 Security
          "
                while IFS= read -r commit; do
                  if [ -n "$commit" ]; then
                    HASH=$(echo "$commit" | cut -d' ' -f1)
                    MSG=$(echo "$commit" | cut -d' ' -f2-)
                    CHANGELOG="$CHANGELOG
          - $MSG ([\`$HASH\`](https://github.com/SijanC147/better-ccflare/commit/$HASH))"
                  fi
                done <<< "$SECURITY"
              fi

              if [ -n "$IMPROVEMENTS" ]; then
                CHANGELOG="$CHANGELOG

          ### 🔧 Improvements
          "
                while IFS= read -r commit; do
                  if [ -n "$commit" ]; then
                    HASH=$(echo "$commit" | cut -d' ' -f1)
                    MSG=$(echo "$commit" | cut -d' ' -f2-)
                    CHANGELOG="$CHANGELOG
          - $MSG ([\`$HASH\`](https://github.com/SijanC147/better-ccflare/commit/$HASH))"
                  fi
                done <<< "$IMPROVEMENTS"
              fi

              # Add comparison link
              CHANGELOG="$CHANGELOG

          ## Full Changelog
          📋 [Compare with previous version](https://github.com/SijanC147/better-ccflare/compare/$PREV_TAG..${{ github.ref_name }})"
            fi
          fi

          # Write changelog to file
          echo "$CHANGELOG" > /tmp/release-notes.md

      - name: Create Beta Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if release already exists
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release already exists, deleting and recreating..."
            gh release delete "${{ github.ref_name }}" -y
          fi

          # Create new release
          if [[ "${{ steps.release_type.outputs.is_prerelease }}" == "true" ]]; then
            gh release create "${{ github.ref_name }}" \
              --title "Beta Release ${{ github.ref_name }}" \
              --notes-file /tmp/release-notes.md \
              --prerelease
          else
            gh release create "${{ github.ref_name }}" \
              --title "Stable Release ${{ github.ref_name }}" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Create macOS tarballs for Homebrew
        run: |
          cd apps/cli/dist

          # Create tarball for macOS ARM64 (Apple Silicon)
          mkdir -p homebrew-arm64
          cp better-ccflare-macos-arm64 homebrew-arm64/better-ccflare
          chmod +x homebrew-arm64/better-ccflare
          tar -czvf better-ccflare-macos-arm64.tar.gz -C homebrew-arm64 better-ccflare

          # Create tarball for macOS x86_64 (Intel)
          mkdir -p homebrew-x86_64
          cp better-ccflare-macos-x86_64 homebrew-x86_64/better-ccflare
          chmod +x homebrew-x86_64/better-ccflare
          tar -czvf better-ccflare-macos-x86_64.tar.gz -C homebrew-x86_64 better-ccflare

          # Cleanup temp directories
          rm -rf homebrew-arm64 homebrew-x86_64

          echo "Created Homebrew tarballs:"
          ls -lh *.tar.gz

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            ./apps/cli/dist/better-ccflare-linux-amd64 \
            ./apps/cli/dist/better-ccflare-linux-arm64 \
            ./apps/cli/dist/better-ccflare-macos-x86_64 \
            ./apps/cli/dist/better-ccflare-macos-arm64 \
            ./apps/cli/dist/better-ccflare-macos-arm64.tar.gz \
            ./apps/cli/dist/better-ccflare-macos-x86_64.tar.gz \
            ./apps/cli/dist/better-ccflare-windows-x64.exe \
            --clobber

  # Publish Homebrew formula after release is complete
  homebrew:
    name: Publish Homebrew Formula
    needs: build
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'pre') }}
    runs-on: ubuntu-latest

    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_PAT: op://CICD/GH_PAT/credential
          GITEA_TOKEN: op://CICD/Gitea/access_token

      - name: Prepare version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download tarballs and calculate SHA256
        id: sha
        run: |
          # Download ARM64 tarball
          curl -fsSL -o arm64.tar.gz \
            "https://github.com/SijanC147/better-ccflare/releases/download/${{ github.ref_name }}/better-ccflare-macos-arm64.tar.gz"
          SHA_ARM64=$(sha256sum arm64.tar.gz | awk '{print $1}')
          echo "sha256_arm64=$SHA_ARM64" >> $GITHUB_OUTPUT
          echo "ARM64 SHA256: $SHA_ARM64"

          # Download x86_64 tarball
          curl -fsSL -o x86_64.tar.gz \
            "https://github.com/SijanC147/better-ccflare/releases/download/${{ github.ref_name }}/better-ccflare-macos-x86_64.tar.gz"
          SHA_X86_64=$(sha256sum x86_64.tar.gz | awk '{print $1}')
          echo "sha256_x86_64=$SHA_X86_64" >> $GITHUB_OUTPUT
          echo "x86_64 SHA256: $SHA_X86_64"

      - name: Generate multi-arch Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
          SHA_ARM64: ${{ steps.sha.outputs.sha256_arm64 }}
          SHA_X86_64: ${{ steps.sha.outputs.sha256_x86_64 }}
        run: |
          cat > /tmp/better-ccflare.rb << 'EOF'
          class BetterCcflare < Formula
            desc "Claude API proxy with intelligent load balancing across multiple accounts"
            homepage "https://github.com/SijanC147/better-ccflare"
            license "MIT"
            version "VERSION_PLACEHOLDER"

            on_arm do
              url "https://github.com/SijanC147/better-ccflare/releases/download/TAG_PLACEHOLDER/better-ccflare-macos-arm64.tar.gz"
              sha256 "SHA_ARM64_PLACEHOLDER"
            end

            on_intel do
              url "https://github.com/SijanC147/better-ccflare/releases/download/TAG_PLACEHOLDER/better-ccflare-macos-x86_64.tar.gz"
              sha256 "SHA_X86_64_PLACEHOLDER"
            end

            def install
              bin.install "better-ccflare"
            end

            def caveats
              <<~EOS
                better-ccflare has been installed!

                To start the proxy server:
                  better-ccflare

                For more information, visit:
                  https://github.com/SijanC147/better-ccflare
              EOS
            end

            test do
              assert_match "better-ccflare", shell_output("#{bin}/better-ccflare --version 2>&1", 1)
            end
          end
          EOF

          # Remove leading whitespace from formula (heredoc preserves YAML indentation)
          sed -i 's/^          //' /tmp/better-ccflare.rb

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" /tmp/better-ccflare.rb
          sed -i "s/TAG_PLACEHOLDER/${TAG}/g" /tmp/better-ccflare.rb
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/g" /tmp/better-ccflare.rb
          sed -i "s/SHA_X86_64_PLACEHOLDER/${SHA_X86_64}/g" /tmp/better-ccflare.rb

          echo "Generated formula:"
          cat /tmp/better-ccflare.rb

      - name: Push to Gitea tap
        run: |
          # Clone the tap repo
          WORK_DIR=$(mktemp -d)
          git clone --depth 1 --branch main \
            "https://oauth2:${GITEA_TOKEN}@git.seanbugeja.me/Sean/homebrew-hextap.git" \
            "$WORK_DIR/tap"

          cd "$WORK_DIR/tap"

          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Ensure Formula directory exists
          mkdir -p Formula

          # Copy the formula
          cp /tmp/better-ccflare.rb Formula/better-ccflare.rb

          # Stage and commit
          git add Formula/better-ccflare.rb

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update better-ccflare to ${{ steps.version.outputs.version }}"
            git push origin main
            echo "✅ Pushed formula to Gitea tap"
          fi

          # Cleanup
          rm -rf "$WORK_DIR"

      - name: Summary
        run: |
          echo "### 🍺 Homebrew Formula Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users can now install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "brew tap seanbugeja/hextap" >> $GITHUB_STEP_SUMMARY
          echo "brew install better-ccflare" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:**" >> $GITHUB_STEP_SUMMARY
          echo "- macOS ARM64 (Apple Silicon): \`${{ steps.sha.outputs.sha256_arm64 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- macOS x86_64 (Intel): \`${{ steps.sha.outputs.sha256_x86_64 }}\`" >> $GITHUB_STEP_SUMMARY