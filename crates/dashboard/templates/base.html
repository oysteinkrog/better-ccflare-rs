<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>better-ccflare-rs — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/dashboard/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/assets/pico.min.css">
  <style>
    /* ================================================================
       better-ccflare-rs — Dashboard Design System
       Base: Pico CSS | Fonts: Inter + JetBrains Mono
       ================================================================ */

    :root {
      --bccf-orange: #f38020;
      --bccf-orange-hover: #e5730f;
      --bccf-orange-subtle: rgba(243, 128, 32, 0.10);
      --nav-width: 220px;

      /* Semantic status colors — light mode */
      --bccf-success: #16a34a;
      --bccf-success-bg: rgba(22, 163, 74, 0.10);
      --bccf-warning: #ca8a04;
      --bccf-warning-bg: rgba(202, 138, 4, 0.10);
      --bccf-danger: #dc2626;
      --bccf-danger-bg: rgba(220, 38, 38, 0.10);
      --bccf-info: #2563eb;
      --bccf-info-bg: rgba(37, 99, 235, 0.10);

      /* Surfaces — light */
      --bccf-bg: #f8f9fa;
      --bccf-surface: #ffffff;
      --bccf-surface-raised: #ffffff;
      --bccf-border: #e2e5e9;
      --bccf-border-subtle: #eff1f3;
      --bccf-text: #111827;
      --bccf-text-secondary: #6b7280;
      --bccf-text-tertiary: #9ca3af;

      /* Shadows — light */
      --bccf-shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
      --bccf-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --bccf-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
      --bccf-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.04);

      /* Transitions */
      --bccf-transition-fast: 150ms ease;
      --bccf-transition-base: 250ms ease;
    }

    /* ---- Dark theme ---- */
    [data-theme="dark"] {
      --bccf-success: #4ade80;
      --bccf-success-bg: rgba(74, 222, 128, 0.10);
      --bccf-warning: #fbbf24;
      --bccf-warning-bg: rgba(251, 191, 36, 0.10);
      --bccf-danger: #f87171;
      --bccf-danger-bg: rgba(248, 113, 113, 0.10);
      --bccf-info: #60a5fa;
      --bccf-info-bg: rgba(96, 165, 250, 0.10);

      --bccf-bg: #0c0e14;
      --bccf-surface: #14161e;
      --bccf-surface-raised: #1c1f2b;
      --bccf-border: #262a38;
      --bccf-border-subtle: #1e2130;
      --bccf-text: #e4e4e7;
      --bccf-text-secondary: #9ca3af;
      --bccf-text-tertiary: #6b7280;

      --bccf-shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.2);
      --bccf-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.2);
      --bccf-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
      --bccf-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.35), 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    /* ================================================================
       Typography Reset
       ================================================================ */
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      margin: 0;
      display: flex;
      min-height: 100vh;
      font-kerning: normal;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bccf-bg);
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    code, pre, kbd, .monospace,
    code *, pre *, kbd * {
      font-family: 'JetBrains Mono', 'SF Mono', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    h2 { font-size: 1.35rem; margin-bottom: 1.25rem; }
    h3 { font-size: 1.05rem; }

    /* ================================================================
       Pico Overrides — harmonize with our design tokens
       ================================================================ */
    [data-theme="dark"] article {
      background: var(--bccf-surface-raised);
      border: 1px solid var(--bccf-border);
    }
    [data-theme="light"] article {
      background: var(--bccf-surface);
      border: 1px solid var(--bccf-border-subtle);
    }
    [data-theme="dark"] .sidebar {
      background: var(--bccf-surface);
      border-color: var(--bccf-border);
    }
    [data-theme="dark"] table thead th {
      border-color: var(--bccf-border);
    }
    [data-theme="dark"] table tbody tr:hover {
      background: rgba(255, 255, 255, 0.025);
    }
    [data-theme="dark"] kbd {
      background: var(--bccf-surface);
      border-color: var(--bccf-border);
      color: var(--bccf-orange);
    }
    [data-theme="dark"] .theme-toggle {
      border-color: var(--bccf-border);
    }
    [data-theme="dark"] .sidebar nav a:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    [data-theme="dark"] input, [data-theme="dark"] select {
      border-color: var(--bccf-border);
    }
    [data-theme="dark"] .usage-bar {
      background: rgba(255, 255, 255, 0.06);
    }
    [data-theme="dark"] figure {
      border-color: var(--bccf-border);
    }

    /* ================================================================
       Layout — Sidebar + Main
       ================================================================ */
    .sidebar {
      width: var(--nav-width);
      min-height: 100vh;
      padding: 1rem 0.75rem;
      border-right: 1px solid var(--pico-muted-border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      overflow-y: auto;
      background: var(--pico-background-color);
      z-index: 10;
    }
    .main-content {
      margin-left: var(--nav-width);
      flex: 1;
      padding: 1.75rem 2.25rem;
      min-width: 0;
      max-width: 1400px;
    }

    /* ================================================================
       Sidebar Brand + Nav
       ================================================================ */
    .sidebar-brand {
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.5rem 0.65rem;
      margin-bottom: 0.75rem;
      color: var(--bccf-orange);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: -0.02em;
    }
    .sidebar-brand small {
      font-weight: 500;
      font-size: 0.6rem;
      opacity: 0.45;
      letter-spacing: 0;
    }
    .sidebar-brand .brand-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--bccf-orange);
      border-radius: 7px;
      flex-shrink: 0;
    }
    .sidebar-brand .brand-icon svg {
      width: 16px;
      height: 16px;
      fill: #fff;
    }
    .sidebar nav { flex: 1; }
    .sidebar nav a {
      display: flex;
      align-items: center;
      padding: 0.45rem 0.65rem;
      margin: 2px 0;
      border-radius: 0.4rem;
      text-decoration: none;
      color: var(--bccf-text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      transition: background var(--bccf-transition-fast), color var(--bccf-transition-fast);
    }
    .sidebar nav a:hover {
      background: var(--pico-muted-border-color);
      color: var(--bccf-text);
    }
    .sidebar nav a.active {
      background: var(--bccf-orange-subtle);
      color: var(--bccf-orange);
      font-weight: 600;
    }
    .sidebar-footer {
      padding-top: 0.75rem;
      margin-top: 0.5rem;
      border-top: 1px solid var(--pico-muted-border-color);
    }

    /* ================================================================
       Theme Toggle
       ================================================================ */
    .theme-toggle {
      cursor: pointer;
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.4rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--bccf-text-secondary);
      width: 100%;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background var(--bccf-transition-fast);
    }
    .theme-toggle:hover { background: var(--pico-muted-border-color); }

    /* Hamburger for mobile */
    .hamburger { display: none; }

    /* ================================================================
       Cards & Articles
       ================================================================ */
    article {
      box-shadow: var(--bccf-shadow-xs);
      border-radius: 0.625rem;
      transition: box-shadow var(--bccf-transition-fast);
    }
    article:hover {
      box-shadow: var(--bccf-shadow-sm);
    }

    /* ================================================================
       Tables
       ================================================================ */
    table {
      font-variant-numeric: tabular-nums;
    }
    table thead th {
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--bccf-text-tertiary);
      font-weight: 600;
    }
    table tbody tr {
      transition: background var(--bccf-transition-fast);
    }
    table tbody tr:hover {
      background: var(--pico-muted-border-color);
    }
    kbd {
      border-radius: 0.25rem;
      box-shadow: var(--bccf-shadow-xs);
      font-size: 0.82em;
    }
    mark { border-radius: 0.25rem; }

    /* ================================================================
       Usage Bars
       ================================================================ */
    .usage-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--pico-muted-border-color);
      overflow: hidden;
    }
    .usage-fill {
      height: 100%;
      border-radius: 3px;
      transition: width var(--bccf-transition-base);
    }
    .usage-fill.success { background: var(--bccf-success); }
    .usage-fill.warning { background: var(--bccf-warning); }
    .usage-fill.danger { background: var(--bccf-danger); }
    .mini-gauge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ================================================================
       Status Badges
       ================================================================ */
    .badge {
      display: inline-block;
      padding: 0.125rem 0.45rem;
      border-radius: 0.3rem;
      font-size: 0.7rem;
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }
    .badge-success { background: var(--bccf-success-bg); color: var(--bccf-success); }
    .badge-warning { background: var(--bccf-warning-bg); color: var(--bccf-warning); }
    .badge-danger { background: var(--bccf-danger-bg); color: var(--bccf-danger); }
    .badge-muted { background: var(--pico-muted-border-color); color: var(--bccf-text-tertiary); }
    .badge-primary { background: var(--bccf-orange-subtle); color: var(--bccf-orange); }
    .badge-tier { background: var(--bccf-info-bg); color: var(--bccf-info); }

    /* ================================================================
       Metric Cards
       ================================================================ */
    .metric-value {
      font-size: 1.85rem;
      font-weight: 700;
      margin: 0;
      line-height: 1.2;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .metric-label {
      font-size: 0.72rem;
      color: var(--bccf-text-tertiary);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .usage-zero { opacity: 0.35; }
    .usage-zero .usage-fill { width: 0 !important; }

    /* Global page explainer box — used on every tab */
    .page-explainer {
      font-size: 0.78rem;
      color: var(--bccf-text-secondary);
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--bccf-border-subtle);
      border-radius: 0.4rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    [data-theme="dark"] .page-explainer { background: rgba(255,255,255,0.04); }
    .page-explainer b { color: var(--bccf-text); }

    /* ================================================================
       Account Cards
       ================================================================ */
    .acct-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .acct-card {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      transition: border-color var(--bccf-transition-fast), box-shadow var(--bccf-transition-fast);
    }
    .acct-card:hover {
      border-color: var(--bccf-border);
      box-shadow: var(--bccf-shadow-xs);
    }
    .acct-card.acct-active {
      border-color: var(--bccf-orange);
      background: var(--bccf-orange-subtle);
      box-shadow: var(--bccf-shadow-xs);
    }
    /* Header row: icon + name + badges | actions */
    .acct-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }
    .acct-name-group { display: flex; align-items: center; gap: 0.4rem; min-width: 0; flex-wrap: wrap; }
    .acct-name-group strong {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(400px, 45vw);
      font-size: 0.9rem;
    }
    .acct-badges { display: inline-flex; gap: 0.3rem; flex-shrink: 0; }
    /* Provider icon */
    .acct-provider-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.3rem;
      height: 1.3rem;
      flex-shrink: 0;
      color: var(--bccf-text-tertiary);
      cursor: help;
    }
    .acct-provider-icon svg { width: 100%; height: 100%; }
    /* Action buttons */
    .acct-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .acct-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.3rem;
      margin: 0;
      min-width: 1.8rem;
      height: 1.8rem;
      line-height: 1;
      border-radius: 0.4rem;
    }
    .acct-btn svg { width: 1rem; height: 1rem; }
    /* Details strip: horizontal chip row */
    .acct-details {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem 0.5rem;
      font-size: 0.82rem;
    }
    .acct-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.15rem 0.5rem;
      border-radius: 0.3rem;
      background: color-mix(in srgb, var(--pico-muted-border-color) 30%, transparent);
      white-space: nowrap;
    }
    [data-theme="dark"] .acct-chip {
      background: rgba(255, 255, 255, 0.04);
    }
    .acct-chip-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--bccf-text-tertiary);
      font-weight: 600;
    }
    .acct-chip kbd { font-size: 0.72rem; white-space: nowrap; }
    .acct-editable {
      cursor: pointer;
      border-bottom: 1px dashed var(--pico-muted-border-color);
      padding-bottom: 1px;
      transition: border-color var(--bccf-transition-fast), color var(--bccf-transition-fast);
    }
    .acct-editable:hover {
      border-bottom-color: var(--bccf-orange);
      color: var(--bccf-orange);
    }
    /* "More" toggle chip */
    .acct-more-toggle {
      cursor: pointer;
      color: var(--bccf-text-tertiary);
      user-select: none;
      font-weight: 500;
    }
    .acct-more-toggle:hover { color: var(--bccf-orange); }
    /* Usage section in account cards */
    .acct-usage {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--pico-muted-border-color);
    }
    .acct-usage-window { flex: 1; min-width: 180px; max-width: 320px; }
    .acct-usage-label { font-size: 0.72rem; color: var(--bccf-text-tertiary); font-weight: 500; }
    .acct-usage-pct { font-size: 0.72rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .acct-usage-reset { font-size: 0.68rem; color: var(--bccf-text-tertiary); }

    /* ================================================================
       Pool Usage Summary
       ================================================================ */
    .pool-summary {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      background: color-mix(in srgb, var(--pico-background-color) 95%, var(--bccf-orange) 5%);
    }
    [data-theme="dark"] .pool-summary {
      background: rgba(255, 255, 255, 0.015);
      border-color: var(--bccf-border);
    }
    .pool-summary-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .pool-status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pool-status-dot.green { background: var(--bccf-success); }
    .pool-status-dot.yellow { background: var(--bccf-warning); }
    .pool-status-dot.red { background: var(--bccf-danger); }
    .pool-windows {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .pool-window {
      flex: 1;
      min-width: 180px;
      max-width: 320px;
    }
    .pool-window-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
      font-size: 0.72rem;
    }
    .pool-window-label { color: var(--bccf-text-tertiary); font-weight: 500; }
    .pool-window-pct { font-weight: 600; font-variant-numeric: tabular-nums; }
    .pool-window-detail {
      display: flex;
      justify-content: space-between;
      margin-top: 3px;
      font-size: 0.68rem;
      color: var(--bccf-text-tertiary);
    }

    /* ================================================================
       Loading & Tab Content
       ================================================================ */
    .htmx-request #tab-content { opacity: 0.5; transition: opacity var(--bccf-transition-fast); }

    /* ================================================================
       Responsive — Mobile
       ================================================================ */
    @media (max-width: 600px) {
      .acct-header { flex-wrap: wrap; }
      .acct-details { gap: 0.3rem; }
      .acct-name-group strong { max-width: min(250px, 55vw); }
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        width: 260px;
      }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1rem; }
      .hamburger {
        display: block;
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 20;
        background: var(--pico-background-color);
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 0.4rem;
        padding: 0.5rem 0.75rem;
        font-size: 1.2rem;
        cursor: pointer;
      }
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9;
        backdrop-filter: blur(2px);
      }
      .sidebar.open ~ .overlay { display: block; }
    }

    /* ================================================================
       Tooltip System — use data-tt="..." on any element
       ================================================================ */
    [data-tt] { cursor: help; }
    button[data-tt], a[data-tt], select[data-tt],
    [data-tt][style*="cursor:pointer"], [data-tt][style*="cursor: pointer"] { cursor: pointer; }
    #bccf-tip {
      position: fixed;
      z-index: 99999;
      pointer-events: none;
      max-width: 280px;
      background: var(--bccf-surface-raised);
      border: 1px solid var(--bccf-border);
      border-radius: 0.45rem;
      padding: 0.45rem 0.7rem;
      font-size: 0.75rem;
      line-height: 1.5;
      color: var(--bccf-text-secondary);
      box-shadow: var(--bccf-shadow-md);
      opacity: 0;
      transition: opacity 0.1s ease;
      white-space: normal;
      word-break: normal;
    }
    #bccf-tip.tt-on { opacity: 1; }
  </style>
</head>
<body>
  <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')" aria-label="Menu">☰</button>
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="/dashboard">
      <span class="brand-icon"><svg viewBox="0 0 32 32"><path d="M18.5 3L8 18h7l-2.5 11L23 14h-7z"/></svg></span>
      <span>better-ccflare<small style="display:block;">v{{ version }}</small></span>
    </a>
    <nav>
      {% for tab in tabs %}
      <a href="/dashboard/{{ tab.slug }}"
         hx-get="/dashboard/{{ tab.slug }}"
         hx-target="#tab-content"
         hx-push-url="true"
         hx-swap="innerHTML"
         class="{% if active_tab == tab.slug %}active{% endif %}"
         onclick="setActiveTab(this)">
        {{ tab.label }}
      </a>
      {% endfor %}
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span> Theme
      </button>
    </div>
  </aside>
  <div class="overlay" onclick="document.querySelector('.sidebar').classList.remove('open')"></div>
  <main class="main-content">
    <div id="tab-content">
      {{ tab_content|safe }}
    </div>
  </main>
  <script src="/dashboard/assets/htmx.min.js"></script>
  <script>
    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('bccf-theme', next);
      document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    }
    // Restore theme (default: dark, respect saved preference or system)
    (function() {
      var saved = localStorage.getItem('bccf-theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
      var icon = document.getElementById('theme-icon');
      if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
    })();
    // Active tab highlight
    function setActiveTab(el) {
      document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
      el.classList.add('active');
      // Close mobile sidebar
      document.querySelector('.sidebar').classList.remove('open');
    }
    // On HTMX content swap, update active tab from URL
    document.body.addEventListener('htmx:afterSettle', function() {
      const path = window.location.pathname;
      document.querySelectorAll('.sidebar nav a').forEach(a => {
        const href = a.getAttribute('href');
        a.classList.toggle('active', path === href || (href === '/dashboard/overview' && path === '/dashboard'));
      });
    });
    // Handle browser back/forward
    window.addEventListener('popstate', function() {
      htmx.ajax('GET', window.location.pathname, {target: '#tab-content', swap: 'innerHTML'});
    });
    // ── Tooltip system ────────────────────────────────────────
    (function() {
      var tip = document.createElement('div');
      tip.id = 'bccf-tip';
      document.body.appendChild(tip);
      var showTimer, activeEl = null;
      document.addEventListener('mouseover', function(e) {
        var el = e.target.closest('[data-tt]');
        if (el === activeEl) return;
        activeEl = el;
        clearTimeout(showTimer);
        tip.classList.remove('tt-on');
        if (!el) return;
        showTimer = setTimeout(function() {
          tip.textContent = el.getAttribute('data-tt');
          tip.classList.add('tt-on');
          positionTip(e.clientX, e.clientY);
        }, 280);
      });
      document.addEventListener('mousemove', function(e) {
        if (tip.classList.contains('tt-on')) positionTip(e.clientX, e.clientY);
      });
      document.addEventListener('mouseout', function(e) {
        if (!e.target.closest('[data-tt]')) return;
        clearTimeout(showTimer);
        tip.classList.remove('tt-on');
        activeEl = null;
      });
      document.addEventListener('click', function() {
        tip.classList.remove('tt-on'); activeEl = null;
      });
      function positionTip(cx, cy) {
        var vw = window.innerWidth, vh = window.innerHeight;
        var tw = Math.min(tip.scrollWidth, 280), th = tip.scrollHeight;
        var x = cx + 14, y = cy + 14;
        if (x + tw > vw - 8) x = cx - tw - 14;
        if (y + th > vh - 8) y = cy - th - 14;
        if (x < 8) x = 8;
        if (y < 8) y = 8;
        tip.style.left = x + 'px';
        tip.style.top = y + 'px';
      }
    })();
  </script>
</body>
</html>
