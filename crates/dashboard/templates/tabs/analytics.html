<h2>Analytics</h2>

<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;">
  <span style="font-size:0.82rem;font-weight:600;color:var(--bccf-text-secondary);">Time range</span>
  <div role="group" id="range-selector" style="display:flex;gap:0;">
    <button class="range-btn" data-range="1h">1h</button>
    <button class="range-btn" data-range="6h">6h</button>
    <button class="range-btn active" data-range="24h">24h</button>
    <button class="range-btn" data-range="7d">7d</button>
    <button class="range-btn" data-range="30d">30d</button>
  </div>
  <span id="analytics-status" style="font-size:0.75rem;color:var(--bccf-text-tertiary);"></span>
</div>

<style>
  .range-btn {
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--bccf-border);
    background: var(--bccf-surface-raised);
    color: var(--bccf-text-secondary);
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    margin: 0;
    transition: background 0.15s, color 0.15s;
  }
  .range-btn:first-child { border-radius: 0.4rem 0 0 0.4rem; }
  .range-btn:last-child { border-radius: 0 0.4rem 0.4rem 0; }
  .range-btn:not(:first-child) { border-left: 0; }
  .range-btn:hover { background: var(--pico-muted-border-color); color: var(--bccf-text); }
  .range-btn.active {
    background: var(--bccf-orange);
    color: white;
    border-color: var(--bccf-orange);
  }
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 1rem;
  }
  .chart-card {
    border: 1px solid var(--bccf-border);
    border-radius: 0.5rem;
    padding: 1rem;
    background: var(--bccf-surface-raised);
    box-shadow: var(--bccf-shadow-xs);
  }
  .chart-card h3 {
    margin: 0 0 0.75rem 0;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--bccf-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chart-card canvas {
    width: 100% !important;
    max-height: 280px;
  }
  .totals-bar {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--bccf-border);
    border-radius: 0.5rem;
    background: var(--bccf-surface-raised);
    box-shadow: var(--bccf-shadow-xs);
  }
  .totals-bar .stat { text-align: center; }
  .totals-bar .stat-value {
    font-size: 1.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }
  .totals-bar .stat-label {
    font-size: 0.68rem;
    color: var(--bccf-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
  }
  .no-data-msg {
    text-align: center;
    padding: 3rem;
    color: var(--bccf-text-tertiary);
    font-style: italic;
  }
</style>

<!-- Totals summary bar -->
<div class="totals-bar" id="totals-bar">
  <div class="stat"><div class="stat-value" id="t-requests">-</div><div class="stat-label">Requests</div></div>
  <div class="stat"><div class="stat-value" id="t-success">-</div><div class="stat-label">Success Rate</div></div>
  <div class="stat"><div class="stat-value" id="t-resp-time">-</div><div class="stat-label">Avg Response</div></div>
  <div class="stat"><div class="stat-value" id="t-tokens">-</div><div class="stat-label">Total Tokens</div></div>
  <div class="stat"><div class="stat-value" id="t-cost">-</div><div class="stat-label">API Value</div></div>
  <div class="stat"><div class="stat-value" id="t-saved" style="color:#22c55e">-</div><div class="stat-label">Money Saved</div></div>
  <div class="stat"><div class="stat-value" id="t-savings-rate">-</div><div class="stat-label">Savings Rate</div></div>
  <div class="stat"><div class="stat-value" id="t-speed">-</div><div class="stat-label">Avg tok/s</div></div>
</div>

<!-- Chart grid -->
<div class="chart-grid">
  <div class="chart-card">
    <h3>Request Volume</h3>
    <canvas id="chart-requests"></canvas>
  </div>
  <div class="chart-card">
    <h3>Response Time</h3>
    <canvas id="chart-response-time"></canvas>
  </div>
  <div class="chart-card">
    <h3>Token Usage</h3>
    <canvas id="chart-tokens"></canvas>
  </div>
  <div class="chart-card">
    <h3>Cost</h3>
    <canvas id="chart-cost"></canvas>
  </div>
  <div class="chart-card">
    <h3>Token Speed</h3>
    <canvas id="chart-speed"></canvas>
  </div>
  <div class="chart-card">
    <h3>Model Distribution</h3>
    <canvas id="chart-models"></canvas>
  </div>
</div>

<!-- Cost by Account table -->
<div class="chart-card" style="margin-top:1rem;">
  <h3>Cost by Account</h3>
  <div style="overflow-x:auto;">
    <table style="width:100%;font-size:0.82rem;border-collapse:collapse;">
      <thead>
        <tr style="border-bottom:1px solid var(--bccf-border);">
          <th style="text-align:left;padding:0.35rem 0.5rem;font-weight:600;color:var(--bccf-text-secondary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;">Account</th>
          <th style="text-align:left;padding:0.35rem 0.5rem;font-weight:600;color:var(--bccf-text-secondary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;">Provider</th>
          <th style="text-align:right;padding:0.35rem 0.5rem;font-weight:600;color:var(--bccf-text-secondary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;">Requests</th>
          <th style="text-align:right;padding:0.35rem 0.5rem;font-weight:600;color:var(--bccf-text-secondary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;">API Value</th>
          <th style="text-align:right;padding:0.35rem 0.5rem;font-weight:600;color:var(--bccf-text-secondary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;">Saved</th>
          <th style="text-align:right;padding:0.35rem 0.5rem;font-weight:600;color:var(--bccf-text-secondary);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.04em;">Actual Cost</th>
        </tr>
      </thead>
      <tbody id="cost-by-account-body">
        <tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--bccf-text-tertiary);font-style:italic;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="/dashboard/assets/chart.min.js"></script>
<script>
(function() {
  'use strict';

  // --- Theme-aware colors ---
  function isDark() {
    return document.documentElement.getAttribute('data-theme') === 'dark';
  }
  function gridColor() { return isDark() ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)'; }
  function textColor() { return isDark() ? '#9ca3af' : '#6b7280'; }

  const COLORS = {
    orange: '#f38020',
    blue: '#3b82f6',
    green: '#22c55e',
    red: '#ef4444',
    purple: '#8b5cf6',
    cyan: '#06b6d4',
    pink: '#ec4899',
    yellow: '#eab308',
    indigo: '#6366f1',
    teal: '#14b8a6',
  };
  const PALETTE = Object.values(COLORS);

  // --- Chart instances ---
  const charts = {};
  let currentRange = '24h';

  // --- Common chart options ---
  function baseOpts(title) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: { mode: 'index', intersect: false },
      },
      scales: {
        x: {
          grid: { color: gridColor() },
          ticks: { color: textColor(), maxTicksLimit: 12, font: { size: 11, family: 'Inter' } },
        },
        y: {
          grid: { color: gridColor() },
          ticks: { color: textColor(), font: { size: 11, family: 'Inter' } },
          beginAtZero: true,
        },
      },
    };
  }

  // --- Format helpers ---
  function fmtNum(n) {
    if (n == null) return '-';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toLocaleString();
  }
  function fmtMs(ms) {
    if (ms == null) return '-';
    return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : Math.round(ms) + 'ms';
  }
  function fmtUsd(v) {
    if (v == null) return '-';
    if (v >= 1) return '$' + v.toFixed(2);
    if (v >= 0.01) return '$' + v.toFixed(4);
    return '$' + v.toFixed(6);
  }
  function fmtPct(v) { return v == null ? '-' : v.toFixed(1) + '%'; }
  function fmtSpeed(v) { return v == null ? '-' : v.toFixed(1); }

  function tsLabel(ts, range) {
    var d = new Date(ts);
    if (range === '30d' || range === '7d') {
      return (d.getMonth() + 1) + '/' + d.getDate();
    }
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }

  // --- Create or update a chart ---
  function makeChart(id, type, data, options) {
    if (charts[id]) {
      charts[id].data = data;
      charts[id].options = options;
      charts[id].update();
      return;
    }
    var ctx = document.getElementById(id);
    if (!ctx) return;
    charts[id] = new Chart(ctx, { type: type, data: data, options: options });
  }

  // --- Render all charts from API data ---
  function renderCharts(data) {
    var ts = data.timeSeries || [];
    var totals = data.totals || {};
    var modelDist = data.modelDistribution || [];
    var range = currentRange;

    // Totals bar
    document.getElementById('t-requests').textContent = fmtNum(totals.requests);
    document.getElementById('t-success').textContent = fmtPct(totals.successRate);
    document.getElementById('t-resp-time').textContent = fmtMs(totals.avgResponseTime);
    document.getElementById('t-tokens').textContent = fmtNum(totals.totalTokens);
    document.getElementById('t-cost').textContent = fmtUsd(totals.totalCostUsd);
    document.getElementById('t-speed').textContent = fmtSpeed(totals.avgTokensPerSecond);
    var saved = totals.totalMoneySavedUsd || 0;
    document.getElementById('t-saved').textContent = fmtUsd(saved);
    var savingsRate = totals.totalCostUsd > 0 ? (saved / totals.totalCostUsd * 100) : 0;
    var rateEl = document.getElementById('t-savings-rate');
    rateEl.textContent = savingsRate.toFixed(1) + '%';
    rateEl.style.color = savingsRate >= 80 ? '#22c55e' : savingsRate >= 40 ? '#eab308' : '#ef4444';

    // Cost by account table
    var costByAccount = data.costByAccount || [];
    var tbody = document.getElementById('cost-by-account-body');
    if (tbody) {
      if (costByAccount.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--bccf-text-tertiary);font-style:italic;">No account data for this range</td></tr>';
      } else {
        tbody.innerHTML = costByAccount.map(function(a) {
          var isFree = a.provider === 'anthropic' || a.provider === 'claude-oauth';
          var actualCost = a.costUsd - a.moneySavedUsd;
          var providerLabel = { 'anthropic': 'Claude OAuth', 'claude-oauth': 'Claude OAuth', 'claude-console-api': 'Claude API', 'zai': 'Zai / Z.AI', 'minimax': 'MiniMax', 'nanogpt': 'NanoGPT', 'vertex-ai': 'Vertex AI' }[a.provider] || a.provider;
          var badge = isFree
            ? '<span style="display:inline-flex;align-items:center;gap:0.2rem;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:9999px;background:rgba(34,197,94,0.13);color:#22c55e;font-weight:600;">✓ ' + providerLabel + '</span>'
            : '<span style="display:inline-flex;align-items:center;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:9999px;background:rgba(59,130,246,0.12);color:#3b82f6;font-weight:500;">' + providerLabel + '</span>';
          var savedCell = a.moneySavedUsd > 0
            ? '<td style="text-align:right;color:#22c55e;font-weight:600;">' + fmtUsd(a.moneySavedUsd) + '</td>'
            : '<td style="text-align:right;color:var(--bccf-text-tertiary);">—</td>';
          return '<tr><td style="padding:0.45rem 0.5rem;font-weight:500;">' + a.name + '</td><td style="padding:0.45rem 0.5rem;">' + badge + '</td><td style="padding:0.45rem 0.5rem;text-align:right;font-variant-numeric:tabular-nums;">' + fmtNum(a.requests) + '</td><td style="padding:0.45rem 0.5rem;text-align:right;font-variant-numeric:tabular-nums;">' + fmtUsd(a.costUsd) + '</td>' + savedCell + '<td style="padding:0.45rem 0.5rem;text-align:right;font-variant-numeric:tabular-nums;">' + (actualCost > 0.00005 ? fmtUsd(actualCost) : '$0.00') + '</td></tr>';
        }).join('');
      }
    }

    if (ts.length === 0 && modelDist.length === 0) {
      document.getElementById('analytics-status').textContent = 'No data for this range';
    } else {
      document.getElementById('analytics-status').textContent = ts.length + ' data points';
    }

    var labels = ts.map(function(p) { return tsLabel(p.ts, range); });

    // 1. Request Volume (bar)
    var reqOpts = baseOpts();
    makeChart('chart-requests', 'bar', {
      labels: labels,
      datasets: [{
        label: 'Requests',
        data: ts.map(function(p) { return p.requests; }),
        backgroundColor: COLORS.orange + 'cc',
        borderRadius: 3,
      }]
    }, reqOpts);

    // 2. Response Time (line)
    var rtOpts = baseOpts();
    rtOpts.scales.y.ticks.callback = function(v) { return fmtMs(v); };
    makeChart('chart-response-time', 'line', {
      labels: labels,
      datasets: [{
        label: 'Avg Response Time',
        data: ts.map(function(p) { return p.avgResponseTime; }),
        borderColor: COLORS.blue,
        backgroundColor: COLORS.blue + '18',
        fill: true,
        tension: 0.35,
        pointRadius: ts.length > 50 ? 0 : 2,
        borderWidth: 2,
      }]
    }, rtOpts);

    // 3. Token Usage (stacked bar)
    var tokenOpts = baseOpts();
    tokenOpts.scales.y.stacked = true;
    tokenOpts.scales.x.stacked = true;
    tokenOpts.plugins.legend = { display: true, position: 'bottom', labels: { color: textColor(), boxWidth: 12, font: { size: 11, family: 'Inter' } } };
    makeChart('chart-tokens', 'bar', {
      labels: labels,
      datasets: [
        {
          label: 'Input',
          data: ts.map(function(p) { return p.tokens; }),
          backgroundColor: COLORS.blue + 'cc',
          borderRadius: 2,
        },
      ]
    }, tokenOpts);

    // 4. Cost vs Money Saved (dual line)
    var costOpts = baseOpts();
    costOpts.scales.y.ticks.callback = function(v) { return fmtUsd(v); };
    costOpts.plugins.legend = { display: true, position: 'bottom', labels: { color: textColor(), boxWidth: 12, font: { size: 11, family: 'Inter' } } };
    makeChart('chart-cost', 'line', {
      labels: labels,
      datasets: [
        {
          label: 'API-equivalent value',
          data: ts.map(function(p) { return p.costUsd; }),
          borderColor: COLORS.orange,
          backgroundColor: COLORS.orange + '22',
          fill: true,
          tension: 0.35,
          pointRadius: ts.length > 50 ? 0 : 2,
          borderWidth: 2,
        },
        {
          label: 'Money saved',
          data: ts.map(function(p) { return p.moneySavedUsd; }),
          borderColor: COLORS.green,
          backgroundColor: COLORS.green + '22',
          fill: true,
          tension: 0.35,
          pointRadius: ts.length > 50 ? 0 : 2,
          borderWidth: 2,
        },
      ]
    }, costOpts);

    // 5. Token Speed (line)
    var speedOpts = baseOpts();
    speedOpts.scales.y.title = { display: true, text: 'tok/s', color: textColor(), font: { size: 11, family: 'Inter' } };
    makeChart('chart-speed', 'line', {
      labels: labels,
      datasets: [{
        label: 'Tokens/sec',
        data: ts.map(function(p) { return p.avgTokensPerSecond; }),
        borderColor: COLORS.purple,
        backgroundColor: COLORS.purple + '18',
        fill: true,
        tension: 0.35,
        pointRadius: ts.length > 50 ? 0 : 2,
        borderWidth: 2,
      }]
    }, speedOpts);

    // 6. Model Distribution (horizontal bar)
    var modelLabels = modelDist.map(function(m) {
      var parts = m.model.split('-');
      return parts.length > 2 ? parts.slice(0, 3).join('-') : m.model;
    });
    var modelOpts = baseOpts();
    modelOpts.indexAxis = 'y';
    modelOpts.scales.x.beginAtZero = true;
    modelOpts.scales.y.ticks.font = { size: 11, family: 'Inter' };
    makeChart('chart-models', 'bar', {
      labels: modelLabels,
      datasets: [{
        label: 'Requests',
        data: modelDist.map(function(m) { return m.count; }),
        backgroundColor: modelDist.map(function(_, i) { return PALETTE[i % PALETTE.length] + 'cc'; }),
        borderRadius: 3,
      }]
    }, modelOpts);
  }

  // --- Fetch data from API ---
  function fetchAnalytics(range) {
    currentRange = range;
    document.getElementById('analytics-status').textContent = 'Loading...';

    fetch('/api/analytics?range=' + range)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        renderCharts(data);
      })
      .catch(function(err) {
        document.getElementById('analytics-status').textContent = 'Error: ' + err.message;
      });
  }

  // --- Range selector buttons ---
  document.querySelectorAll('.range-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.range-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      fetchAnalytics(btn.getAttribute('data-range'));
    });
  });

  // --- Theme change: update chart colors ---
  var observer = new MutationObserver(function() {
    Object.keys(charts).forEach(function(id) {
      var c = charts[id];
      if (c.options.scales && c.options.scales.x) {
        c.options.scales.x.grid.color = gridColor();
        c.options.scales.x.ticks.color = textColor();
      }
      if (c.options.scales && c.options.scales.y) {
        c.options.scales.y.grid.color = gridColor();
        c.options.scales.y.ticks.color = textColor();
      }
      c.update();
    });
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  // --- Initial load ---
  fetchAnalytics(currentRange);
})();
</script>
