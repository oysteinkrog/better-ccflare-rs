{% if agents.is_empty() %}
<p>No agents discovered yet. Agents are detected automatically from <code>User-Agent</code> headers in API requests.</p>
{% else %}
<figure>
<table role="grid">
  <thead>
    <tr>
      <th>Agent ID</th>
      <th>Preferred Model</th>
      <th>Last Updated</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for agent in agents %}
    <tr id="agent-row-{{ agent.agent_id }}">
      <td><strong>{{ agent.agent_id }}</strong></td>
      <td id="agent-model-{{ agent.agent_id }}">
        <form hx-post="/api/agents/{{ agent.agent_id }}/model"
              hx-target="#agent-model-{{ agent.agent_id }}"
              hx-swap="innerHTML"
              style="display: inline; margin: 0;">
          <select name="model"
                  hx-post="/api/agents/{{ agent.agent_id }}/model"
                  hx-target="closest tr"
                  hx-swap="outerHTML"
                  hx-trigger="change"
                  hx-vals='{"source": "dashboard"}'
                  style="margin: 0; padding: 0.25rem 0.5rem; font-size: 0.85rem; width: auto; display: inline-block;">
            {% for m in all_models %}
            <option value="{{ m }}"{% if m.as_str() == agent.preferred_model.as_str() %} selected{% endif %}>
              {{ m }}{% if m.as_str() == default_model.as_str() %} (default){% endif %}
            </option>
            {% endfor %}
          </select>
        </form>
      </td>
      <td><small>{{ agent.updated_at_relative }}</small></td>
      <td>
        <button class="outline secondary"
                hx-delete="/api/agents/{{ agent.agent_id }}/model"
                hx-target="#agent-row-{{ agent.agent_id }}"
                hx-swap="outerHTML"
                hx-confirm="Reset model preference for {{ agent.agent_id }} to default?"
                style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">
          Reset
        </button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</figure>
<small class="secondary">{{ agents.len() }} agent(s) &middot; Default model: {{ default_model }} &middot; Auto-refreshes every 30s</small>
{% endif %}
